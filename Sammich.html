<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clyde's Sandwich Stack</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f4f4f4;
      overflow: hidden;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      background: #c2e0ff;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
<script>
    const LANDING_OFFSET_X = 20;
    const LANDING_OFFSET_Y = 228;
    const STACK_SPACING = 9;
    const CHARACTER_WIDTH = 320;
    const CHARACTER_HEIGHT = 320;
    const TOPPING_WIDTH = 100;
    const TOPPING_HEIGHT = 100;
    const SANDWICH_LAYER_HEIGHT = 20;
    const MAX_MISSES = 5;
    const NO_SPAWN_ZONE_WIDTH = 200;

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let score = 0;
    let missed = 0;
    let gameOver = false;
    let level = 1;
    let spawnInterval = 2000;
    let lastSpawnTime = Date.now();
    let sandwichCompleted = false;
    let gameStarted = false;
    let showStartScreen = true;
    let highScore = 0;
    let levelStartTime = 0;

    const toppings = [];
    const sandwich = [];
    const toppingTypes = ["lettuce", "cheese", "tomato", "bacon", "bread"];

    const toppingColors = {
      lettuce: "green",
      cheese: "yellow",
      tomato: "red",
      bacon: "brown",
      bread: "#f5deb3"
    };

    const toppingImages = {
      bacon: new Image(),
      lettuce: new Image(),
      tomato: new Image(),
      cheese: new Image(),
      bread: new Image()
    };
    toppingImages.bacon.src = "img/ham.png";
    toppingImages.lettuce.src = "img/lettuce.png";
    toppingImages.tomato.src = "img/tomato.png";
    toppingImages.cheese.src = "img/cheese.png";
    toppingImages.bread.src = "img/bread.png";

    const clydeImg = new Image();
    clydeImg.src = "img/sammich_clyde.png";

    const clyde = {
      x: canvas.width / 2 - CHARACTER_WIDTH / 2,
      y: canvas.height - CHARACTER_HEIGHT,
      width: CHARACTER_WIDTH,
      height: CHARACTER_HEIGHT,
      baseSpeed: 2,
      speed: 2,
      maxSpeed: 10,
      acceleration: 0.2
    };

    const keys = {
      ArrowLeft: false,
      ArrowRight: false
    };

    document.addEventListener("keydown", (e) => {
      if (gameOver) {
        resetGame();
        return;
      }

      if (showStartScreen) {
        gameStarted = true;
        showStartScreen = false;
        levelStartTime = Date.now();
        lastSpawnTime = Date.now();
        return;
      }

      if (e.key in keys) {
        keys[e.key] = true;
      }
    });

    document.addEventListener("keyup", (e) => {
      if (e.key in keys) keys[e.key] = false;
      clyde.speed = clyde.baseSpeed;
    });

    function resetGame() {
      score = 0;
      missed = 0;
      gameOver = false;
      level = 1;
      spawnInterval = 2000;
      toppings.length = 0;
      sandwich.length = 0;
      sandwichCompleted = false;
      lastSpawnTime = Date.now();
      gameStarted = false;
      showStartScreen = true;
    }

    function spawnTopping() {
        let availableToppings = [...toppingTypes];
        if (Date.now() - levelStartTime < 15000) {
            availableToppings = availableToppings.filter(type => type !== "bread");
        }

        const type = availableToppings[Math.floor(Math.random() * availableToppings.length)];
        if (type) {
            toppings.push({
                x: Math.random() * (canvas.width - TOPPING_WIDTH - NO_SPAWN_ZONE_WIDTH),
                y: 0,
                type: type,
                width: TOPPING_WIDTH,
                height: TOPPING_HEIGHT,
                speed: 2 + Math.random() * 1.5
            });
        }
    }

    function drawClyde() {
      if (clydeImg.complete && clydeImg.naturalWidth !== 0) {
        ctx.drawImage(clydeImg, clyde.x, clyde.y, clyde.width, clyde.height);
      } else {
        ctx.fillStyle = "#444";
        ctx.fillRect(clyde.x, clyde.y, clyde.width, clyde.height);
      }
    }

    function drawToppings() {
      for (let t of toppings) {
        const img = toppingImages[t.type];
        if (img && img.complete && img.naturalWidth !== 0) {
          ctx.drawImage(img, t.x, t.y, t.width, t.height);
        } else {
          ctx.fillStyle = toppingColors[t.type] || "gray";
          ctx.fillRect(t.x, t.y, t.width, t.height);
        }
      }
    }

    function getBreadPosition(stackIndex = 0) {
      return {
        x: clyde.x + LANDING_OFFSET_X,
        y: clyde.y + LANDING_OFFSET_Y - stackIndex * STACK_SPACING
      };
    }

    function drawSandwich() {
      for (let i = 0; i < sandwich.length; i++) {
        const part = sandwich[i];
        const img = toppingImages[part];
        const { x: breadX, y: breadY } = getBreadPosition(i);
        if (img && img.complete && img.naturalWidth !== 0) {
          ctx.drawImage(img, breadX, breadY, TOPPING_WIDTH, SANDWICH_LAYER_HEIGHT);
        } else {
          ctx.fillStyle = toppingColors[part] || "gray";
          ctx.fillRect(breadX, breadY, TOPPING_WIDTH, SANDWICH_LAYER_HEIGHT);
        }
      }
    }

    function drawStartScreen() {
      ctx.fillStyle = "black";
      ctx.font = "40px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Press Any Key to Start", canvas.width / 2, canvas.height / 2);
    }

    function drawGameOverScreen() {
      ctx.fillStyle = "black";
      ctx.font = "40px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 40);
      ctx.fillText("High Score: " + highScore, canvas.width / 2, canvas.height / 2);
      ctx.fillText("Press Any Key to Restart", canvas.width / 2, canvas.height / 2 + 40);
    }

    // Restructured update() function for a clean game loop
    function update() {
      // Clear the entire canvas on every frame
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (showStartScreen) {
        drawStartScreen();
      } else if (gameOver) {
        drawGameOverScreen();
      } else if (gameStarted) {
        // --- Active Gameplay Logic ---

        if (keys.ArrowLeft) {
          clyde.x -= clyde.speed;
          clyde.speed = Math.min(clyde.speed + clyde.acceleration, clyde.maxSpeed);
        } else if (keys.ArrowRight) {
          clyde.x += clyde.speed;
          clyde.speed = Math.min(clyde.speed + clyde.acceleration, clyde.maxSpeed);
        } else {
          clyde.speed = clyde.baseSpeed;
        }

        clyde.x = Math.max(0, Math.min(canvas.width - clyde.width, clyde.x));

        drawClyde();
        drawToppings();
        drawSandwich();

        const now = Date.now();
        if (!sandwichCompleted && now - lastSpawnTime > spawnInterval) {
          spawnTopping();
          lastSpawnTime = now;
        }

        for (let i = toppings.length - 1; i >= 0; i--) {
          let t = toppings[i];
          t.y += t.speed;

          let { x: breadX, y: breadY } = getBreadPosition(sandwich.length);

          if (
            t.y + t.height >= breadY &&
            t.y <= breadY + SANDWICH_LAYER_HEIGHT &&
            t.x < breadX + TOPPING_WIDTH &&
            t.x + t.width > breadX
          ) {
            sandwich.push(t.type);
            toppings.splice(i, 1);

            if (t.type === "bread") {
              sandwichCompleted = true;
              setTimeout(() => {
                level++;
                score += 5;
                spawnInterval = Math.max(500, spawnInterval - 100);
                toppings.length = 0;
                sandwich.length = 0;
                sandwichCompleted = false;
                showStartScreen = true;
                gameStarted = false;
              }, 2000);
            } else {
              score++;
            }
          } else if (t.y > canvas.height) {
            toppings.splice(i, 1);
            missed++;
            if (missed >= MAX_MISSES) {
              gameOver = true;
              highScore = Math.max(highScore, score);
            }
          }
        }

        ctx.fillStyle = "black";
        ctx.font = "20px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("Score: " + score, 10, 30);
        ctx.fillText("Missed: " + missed + " / " + MAX_MISSES, 10, 60);
        ctx.fillText("Level: " + level, 10, 90);
      }

      // Keep the loop running continuously
      requestAnimationFrame(update);
    }

    // Initial call to start the game loop
    update();
</script>
</body>
</html>
